baseURL = 'https://discaptive.com'  # Your domain name.
languageCode = 'en-US'
title = 'Discaptive의 개발 블로그'  # Title of your website

[[module.imports]]
  path = "github.com/discaptive/hugo-discaptive"
  
[params]
  github = 'https://github.com/discaptive'
  username = 'Discaptive'

  # To enable giscus, the GitHub-discussions-based comment section,
  # input the repository for the discussions below. For more details, see
  # https://giscus.app
  [params.giscus]
    repo = 'discaptive/discaptive.github.io'
    repoId = 'R_kgDON-1NgQ'
    category = 'General'
    categoryId = 'DIC_kwDON-1Ngc4CnTfD'
    mapping = 'pathname'
    reactionsEnabled = '1'
    inputPosition = 'top'
    theme = 'light'
    lang = 'en'

[pagination]
  pagerSize = 5  # Specify the max number of rows to be returned in list

# Menu items displayed in the header.
[[menus.main]]
  name = 'Contact'
  url = 'mailto:discaptive@gmail.com'
  weight = 1
[[menus.main]]
  name = 'Tags'
  url = '/tags'
  weight = 2
[[menus.main]]
  name = 'About'
  url = '/about'
  weight = 3

